name: book_dashboard
description: "Book Dashboard — Android companion app (phone + tablet). Same backend, same database as the web dashboard."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_markdown: ^0.7.3
  file_picker: ^10.0.0
  webview_flutter: ^4.8.0
  path_provider: ^2.1.3
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
